<style>
    #modalGerenciarCustosFixos .table-custos th {
        background-color: #6c757d;
        color: white;
    }
    #modalGerenciarCustosFixos .table-custos .btn i {
        color: white !important;
    }
</style>

<!-- MODAL: GERENCIAR CUSTOS FIXOS -->
<div class="modal fade" id="modalGerenciarCustosFixos" tabindex="-1" aria-labelledby="modalGerenciarCustosFixosLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-scrollable">
        <div class="modal-content">
            <div class="modal-header bg-secondary text-white">
                <h5 class="modal-title" id="modalGerenciarCustosFixosLabel">Custos Fixos</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Fechar"></button>
            </div>
            <div class="modal-body">
                <p class="text-muted small mb-3">Este valor é chamado de <strong>Custo Fixo</strong> porque ele será o mesmo tanto em um mês bom, quanto num mês fraco de vendas.</p>
                <button type="button" class="btn btn-secondary btn-sm mb-3" onclick="abrirModalCustoFixo()">
                    <i class="bi bi-plus-circle"></i> Adicionar custo fixo
                </button>
                <span id="custo-success-msg-modal" class="text-success ms-2 small" style="display: none;"></span>
                <div class="table-responsive">
                    <table class="table table-striped table-custos mb-0" id="tabela-custos">
                        <thead>
                            <tr>
                                <th>Nome</th>
                                <th>Categoria</th>
                                <th>Valor</th>
                                <th style="width: 100px;">Ações</th>
                            </tr>
                        </thead>
                        <tbody id="custos-cadastrados"></tbody>
                    </table>
                </div>
                <p id="sem-custos" class="text-muted mt-3 mb-0">Nenhum custo fixo cadastrado. Clique em &quot;Adicionar custo fixo&quot;.</p>
                <div class="mt-3 pt-3 border-top d-flex justify-content-between align-items-center">
                    <span class="fw-semibold">Total Custos Fixos</span>
                    <span class="fs-5 fw-bold text-primary" id="modal-custos-total">R$ 0,00</span>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-primary" data-bs-dismiss="modal">Concluir</button>
            </div>
        </div>
    </div>
</div>

<!-- MODAL: CADASTRAR/EDITAR CUSTO FIXO -->
<div class="modal fade" id="modalCustoFixo" tabindex="-1" aria-labelledby="modalCustoFixoLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header bg-secondary text-white">
                <h5 class="modal-title" id="modalCustoFixoLabel">Cadastrar Custo Fixo</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Fechar"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="custo_fixo_id">
                <div class="mb-3">
                    <label for="custo_nome" class="form-label">Nome do Custo</label>
                    <input type="text" class="form-control" id="custo_nome" placeholder="Ex: Aluguel" required>
                </div>
                <div class="mb-3">
                    <label for="custo_valor" class="form-label">Valor (R$)</label>
                    <input type="number" class="form-control" id="custo_valor" placeholder="Ex: 1500.00" step="0.01" required>
                </div>
                <div class="mb-3">
                    <label for="custo_categoria" class="form-label">Categoria</label>
                    <select class="form-select" id="custo_categoria" required>
                        <option value="">Selecione...</option>
                        <option value="Aluguel">Aluguel</option>
                        <option value="Salarios">Salários</option>
                        <option value="Luz">Luz</option>
                        <option value="Agua">Água</option>
                        <option value="Telefone">Telefone</option>
                        <option value="Internet">Internet</option>
                        <option value="Marketing">Marketing</option>
                        <option value="Seguros">Seguros</option>
                        <option value="Manutencao">Manutenção</option>
                        <option value="Impostos">Impostos</option>
                        <option value="Pro-labore">Pro-labore</option>
                        <option value="Outros">Outros</option>
                    </select>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                <button type="button" class="btn btn-primary" onclick="salvarCustoFixo()">Salvar Custo</button>
            </div>
        </div>
    </div>
</div>
